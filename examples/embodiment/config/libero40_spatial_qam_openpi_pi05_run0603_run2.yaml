defaults:
  - env/libero_spatial@env.train
  - env/libero_spatial@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/bucket_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero40_qam_12env_train240_run2"
    logger_backends: ["wandb"] # wandb, swanlab
  max_epochs: 1200
  max_steps: -1
  only_eval: False
  val_check_interval: 100
  save_interval: 200
  resume_dir: null
  ckpt_path: null
  weight_sync_interval: 1

algorithm:
  # ---- selects the QAM actor worker ----
  adv_type: embodied_sac
  loss_type: embodied_qam
  loss_agg_func: "token-mean"

  # ---- SAC machinery reused by QAM ----
  gamma: 0.99
  tau: 0.005
  update_epoch: 1
  critic_actor_ratio: 12
  target_update_freq: 1
  target_update_type: q_head_only
  bootstrap_type: standard
  train_actor_steps: 200
  replay_buffer:
    enable_cache: True
    cache_size: 50
    min_buffer_size: 50
    sample_window_size: 50
    auto_save: False

  # ---- QAM-specific ----
  rollout_epoch: 1
  eval_rollout_epoch: 50
  flow_steps: 10
  inv_temp: 0.1
  qam_target_reduction: mean_minus_std
  qam_pessimism_rho: 0.5
  num_q_heads: 2

  # params for rollout generation (OpenPI rollout needs these)
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  train:
    total_num_envs: 12
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240
    video_cfg:
      save_video: False
  eval:
    seed: 0
    total_num_envs: 10
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240
    group_size: 1
    is_eval: True
    video_cfg:
      save_video: False
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: True
  pipeline_stage_num: 1
  collect_transitions: True
  collect_prev_infos: False
  model:
    model_path: "/mnt/kpfs/zhangwenlong/RLinf/.checkpoints/lwd2/openpi/pi05_libero_40_sft_pytorch" # https://huggingface.co/RLinf/RLinf-Pi05-LIBERO-SFT
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 2
  global_batch_size: 8
  seed: 42
  enable_offload: False

  # Override the default values in model/pi0_5
  model:
    model_path: "/mnt/kpfs/zhangwenlong/RLinf/.checkpoints/lwd2/openpi/pi05_libero_40_sft_pytorch" # https://huggingface.co/RLinf/RLinf-Pi05-LIBERO-SFT
    model_type: "openpi"
    paligemma_max_token_len: 200
    num_action_chunks: 5
    action_dim: 7
    num_steps: 10
    add_value_head: False
    openpi:
      train_expert_only: True
      use_qam: True
      qam_num_q_heads: 2
      qam_q_hidden_dims: [512, 512]
      qam_pool_mode: mean_token
      action_dim: 32
      action_chunk: ${actor.model.num_action_chunks}
      action_env_dim: ${actor.model.action_dim}
      use_dsrl: False
    openpi_data:
      repo_id: "assets/libero_40"

  optim:
    lr: 1.0e-6
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0
    lr_scheduler: torch_constant

  critic_optim:
    lr: 1.0e-4
    clip_grad: 1.0
    lr_scheduler: torch_constant

  # Override the default values in training_backend/fsdp
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: False
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
