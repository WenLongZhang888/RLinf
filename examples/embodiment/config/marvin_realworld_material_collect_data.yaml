defaults:
  - env/marvin_realworld_material_grab_and_place@env.eval
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    env:
      node_group: marvin
      placement: 0
  node_groups:
    - label: marvin
      node_ranks: 0
      hardware:
        type: Marvin
        configs:
          - robot_ip: ${oc.env:MARVIN_ROBOT_IP,192.168.71.190}
            node_rank: 0
            camera_serials:
              wrist_1: "230322273834"
              wrist_2: "230322274885"
              side_policy: "335122271065"
              side_classifier: "335122271065"

runner:
  task_type: embodied
  logger:
    log_path: null
    project_name: rlinf
    experiment_name: "collect-marvin-material-data"
    logger_backends: ["tensorboard"]
  num_data_episodes: 20
  record_task_description: False

env:
  group_name: "EnvGroup"
  eval:
    ignore_terminations: False
    auto_reset: False
    teleop_mode: spacemouse
    use_spacemouse: True
    use_vr: False
    no_gripper: False
    max_episode_steps: 500
    override_cfg:
      controller_type: ${oc.env:MARVIN_CONTROL_MODE,position}
      target_ee_pose: [0.48537828, -0.17391559, 0.17181447, -1.5444949, -0.0084113264, -3.1288216]
      reset_ee_pose: [0.48537828, -0.17391559, 0.17181447, -1.5444949, -0.0084113264, -3.1288216]
      preserve_reference_reset: True
      lock_orientation: True
      lock_tcp_orientation: True
      spacemouse_open_loop: True
      update_controller_params: True
      classifier:
        enabled: True
        checkpoint_path: null
        image_keys: ["side_classifier"]
        threshold: 0.8
        debug: True

    data_collection:
      enabled: True
      save_dir: ${runner.logger.log_path}/collected_data
      export_format: "pickle"
      only_success: True
      robot_type: "marvin"
      fps: 10
