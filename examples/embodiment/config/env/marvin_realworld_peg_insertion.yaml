env_type: realworld

total_num_envs: null

auto_reset: True
ignore_terminations: True
reward_mode: raw
wrap_obs_mode: simple
seed: 0
group_size: 1
use_fixed_reset_state_ids: False
max_steps_per_rollout_epoch: 100
max_episode_steps: 100
teleop_mode: spacemouse
use_spacemouse: False
use_vr: False
use_gello: False
no_gripper: False
main_image_key: wrist_1

spacemouse_config:
  device_index: 0

vr_config:
  side: left
  translation_scale: 1.0
  xyz_scale: [1.0, 1.0, 1.0]
  track_rotation: False
  max_step_m: 0.004
  max_rot_deg: 1.0
  gripper_threshold: 0.6

video_cfg:
  save_video: False
  info_on_video: True
  video_base_dir: ${runner.logger.log_path}/video/train

init_params:
  id: "MarvinPegInsertionEnv-v1"
  num_envs: null
