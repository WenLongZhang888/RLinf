defaults:
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "lwd_pi05_sft_train"
    logger_backends: ["wandb"] # wandb, swanlab

  max_epochs: -1
  max_steps: 1000
  val_check_interval: -1
  save_interval: 500

data:
  train_data_paths: "/path/to/libero-data"

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 16
  seed: 0

  # Override the default values in model/pi0_5
  model:
    precision: null
    model_path: "/path/to/pi05-model"
    num_action_chunks: 5 # interface for the env
    add_value_head: False
    openpi:
      train_expert_only: True
      config_name: "pi05_libero"
      detach_critic_input: True

  optim:
    lr: 2.5e-5  
    value_lr: 1.55e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08  
    weight_decay: 1.0e-10  
    clip_grad: 1.0
    warmup_style: "cosine"  
    lr_warmup_steps: 100  
    total_training_steps: ${runner.max_steps}  # for lr scheduler cosine decay

  # Override the default values in training_backend/fsdp
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: False
    gradient_checkpointing: False # for openpi, gradient checkpointing is not supported, please do not change this value
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}
